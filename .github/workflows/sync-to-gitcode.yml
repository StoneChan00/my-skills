name: Sync to GitCode

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror clone from GitHub
        run: |
          git clone --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo-mirror

      - name: Push mirror to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_USER: StoneChan_
          GITCODE_REPO: my-skills
        run: |
          cd repo-mirror
          git push --mirror "https://${GITCODE_USER}:${GITCODE_TOKEN}@gitcode.com/${GITCODE_USER}/${GITCODE_REPO}.git"
